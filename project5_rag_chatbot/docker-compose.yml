services:
  ask-my-pdf-bot:
    build: .
    image: ask-my-pdf-bot:latest
    container_name: ask-my-pdf-bot
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_MODEL=${HF_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      - EMBED_MODEL=${EMBED_MODEL:-BAAI/bge-small-en-v1.5}
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - TOP_K=${TOP_K:-4}
      - MAX_HISTORY_TURNS=${MAX_HISTORY_TURNS:-4}
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface

volumes:
  hf_cache:
